<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="geometricPrecision">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Subtle top edge highlight for depth -->
  <rect x="1" y="1" width="30" height="1.5" rx="0.75" fill="white" fill-opacity="0.18"/>

  <!-- Note head: filled ellipse, tilted like a proper music note -->
  <ellipse cx="12.5" cy="23.5" rx="4.5" ry="3.1"
           transform="rotate(-20 12.5 23.5)" fill="white"/>

  <!-- Stem: rounded rect from head up -->
  <rect x="16.5" y="8" width="2.2" height="16.2" rx="1.1" fill="white"/>

  <!-- Flag: single curved stroke matching classic eighth note -->
  <path d="M18.7 8
           C 23.5 10.5, 25.5 15, 22.5 20.5
           C 21 18, 19.5 15, 18.7 12
           Z"
        fill="white"/>
</svg>
