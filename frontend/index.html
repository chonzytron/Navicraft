<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NaviCraft</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#07070a;--surface:#0e0e14;--surface-2:#14141e;--surface-3:#1c1c2a;
  --border:#1e1e30;--border-hover:#2e2e48;--border-focus:#4f46e5;
  --text:#e4e4ee;--text-2:#a0a0b8;--text-3:#606078;--text-4:#3a3a50;
  --accent:#4f46e5;--accent-dim:#4f46e520;--accent-glow:#4f46e530;
  --green:#10b981;--green-dim:#10b98118;
  --amber:#f59e0b;--amber-dim:#f59e0b18;
  --red:#ef4444;--red-dim:#ef444418;
  --radius:10px;--radius-sm:6px;
  --font:'Sora',sans-serif;--mono:'DM Mono',monospace;
  --ease:cubic-bezier(.22,1,.36,1);
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* --- Noise texture overlay --- */
body::before{content:'';position:fixed;inset:0;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.5}

.app{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:48px 32px 100px}

/* --- Header --- */
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:40px}
.logo{display:flex;align-items:center;gap:14px}
.logo-mark{width:40px;height:40px;border-radius:8px;background:linear-gradient(135deg,var(--accent),#7c3aed);display:grid;place-items:center;font-size:18px;box-shadow:0 0 24px var(--accent-glow),inset 0 1px 0 #fff1}
.logo h1{font-size:22px;font-weight:600;letter-spacing:-.5px;color:var(--text)}
.logo h1 span{color:var(--accent);font-weight:300}

.header-right{display:flex;align-items:center;gap:12px}
.badge{font-family:var(--mono);font-size:11px;font-weight:400;padding:6px 13px;border-radius:20px;border:1px solid var(--border);color:var(--text-3);display:flex;align-items:center;gap:6px;cursor:pointer;transition:border-color .2s;white-space:nowrap}
.badge:hover{border-color:var(--border-hover)}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dot-ok{background:var(--green);box-shadow:0 0 6px #10b98150}
.dot-err{background:var(--red)}
.dot-busy{background:var(--amber);animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* --- Stats --- */
.stats{display:flex;gap:2px;margin-bottom:32px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.stat{flex:1;padding:16px 20px;position:relative}
.stat+.stat::before{content:'';position:absolute;left:0;top:20%;height:60%;width:1px;background:var(--border)}
.stat-val{font-size:20px;font-weight:600;letter-spacing:-.3px}
.stat-lbl{font-family:var(--mono);font-size:10px;color:var(--text-4);text-transform:uppercase;letter-spacing:.8px;margin-top:3px}

/* --- Prompt --- */
.prompt-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px;margin-bottom:32px;transition:border-color .25s,box-shadow .25s}
.prompt-wrap:focus-within{border-color:var(--border-focus);box-shadow:0 0 0 3px var(--accent-glow)}
.prompt-wrap textarea{width:100%;background:none;border:none;outline:none;color:var(--text);font-family:var(--font);font-size:16px;line-height:1.65;resize:vertical;min-height:80px}
.prompt-wrap textarea::placeholder{color:var(--text-4)}
.prompt-foot{display:flex;align-items:center;justify-content:space-between;margin-top:16px;padding-top:16px;border-top:1px solid var(--border);gap:14px;flex-wrap:wrap}
.prompt-opts{display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.opt{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--text-3)}
.opt input[type=number]{width:58px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 8px;color:var(--text);font-family:var(--mono);font-size:13px;outline:none;text-align:center}
.opt input:focus{border-color:var(--border-focus)}
.toggle-wrap{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--text-3);cursor:pointer;user-select:none}
.toggle-track{width:34px;height:20px;background:var(--surface-3);border-radius:10px;position:relative;transition:background .2s;border:1px solid var(--border);flex-shrink:0}
.toggle-track::after{content:'';width:14px;height:14px;border-radius:50%;background:var(--text-3);position:absolute;top:2px;left:2px;transition:all .2s}
.toggle-track.on{background:var(--accent);border-color:var(--accent)}
.toggle-track.on::after{left:16px;background:#fff}

.btn-gen{background:var(--accent);color:#fff;border:none;padding:10px 30px;border-radius:8px;font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;box-shadow:0 2px 16px var(--accent-glow);white-space:nowrap}
.btn-gen:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 4px 24px var(--accent-glow)}
.btn-gen:disabled{opacity:.4;cursor:not-allowed}

/* --- Loading --- */
.loading{display:none;text-align:center;padding:60px 20px}
.loading.on{display:block}
.spinner{width:40px;height:40px;border:2.5px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 18px}
@keyframes spin{to{transform:rotate(360deg)}}
.load-msg{color:var(--text-3);font-size:14px}
.load-sub{color:var(--text-4);font-size:12px;font-family:var(--mono);margin-top:8px}

/* --- Results --- */
.results{display:none}
.results.on{display:block}
.res-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:8px}
.res-name{font-size:22px;font-weight:600;letter-spacing:-.3px}
.saved-pill{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:14px;background:var(--green-dim);border:1px solid var(--green);color:var(--green);font-size:12px;font-weight:500;white-space:nowrap}
.res-desc{color:var(--text-2);font-size:14px;line-height:1.55;margin-bottom:18px}
.res-meta{display:flex;gap:18px;margin-bottom:16px;font-family:var(--mono);font-size:11px;color:var(--text-4);text-transform:uppercase;letter-spacing:.5px}

/* Song list */
.songs{list-style:none;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.song{display:flex;align-items:center;gap:14px;padding:12px 16px;border-bottom:1px solid var(--border);transition:background .1s}
.song:last-child{border-bottom:none}
.song:hover{background:var(--surface)}
.s-num{font-family:var(--mono);font-size:12px;color:var(--text-4);width:28px;text-align:right;flex-shrink:0}
.s-info{flex:1;min-width:0}
.s-title{font-weight:500;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.s-artist{font-size:13px;color:var(--text-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.s-album{font-size:12px;color:var(--text-4);font-family:var(--mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;flex-shrink:0}
.s-dur{font-family:var(--mono);font-size:12px;color:var(--text-4);flex-shrink:0;width:48px;text-align:right}

.res-actions{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap}
.btn{padding:10px 24px;border-radius:8px;font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;border:none}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 2px 12px var(--accent-glow)}
.btn-primary:hover{transform:translateY(-1px)}
.btn-ghost{background:transparent;color:var(--text-3);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--text-3);color:var(--text-2)}

/* --- Enrichment indicator --- */
.enrich-bar{display:none;padding:8px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:16px;font-size:12px;font-family:var(--mono);color:var(--text-4);align-items:center;gap:8px}
.enrich-bar.on{display:flex}
.enrich-fill{height:3px;background:var(--accent);border-radius:2px;transition:width .5s}

/* --- History --- */
.history{margin-top:48px}
.history h2{font-size:16px;font-weight:600;color:var(--text-2);margin-bottom:14px;letter-spacing:-.2px}
.hist-list{list-style:none}
.hist-item{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:6px;cursor:pointer;transition:border-color .15s}
.hist-item:hover{border-color:var(--border-hover)}
.hist-left{flex:1;min-width:0}
.hist-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hist-meta{font-size:11px;color:var(--text-4);font-family:var(--mono);margin-top:2px}
.hist-prompt{font-size:12px;color:var(--text-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.hist-actions{display:flex;gap:6px;flex-shrink:0}
.hist-btn{padding:6px 14px;border-radius:6px;font-family:var(--font);font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text-3);white-space:nowrap;transition:all .15s;flex-shrink:0}
.hist-btn:hover{border-color:var(--accent);color:var(--accent)}
.hist-btn-del{padding:6px 10px;border-radius:6px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text-4);transition:all .15s;flex-shrink:0;line-height:1}
.hist-btn-del:hover{border-color:var(--red);color:var(--red)}

/* --- Provider selector --- */
.pvd-wrap{display:none;align-items:center;gap:8px}
.pvd-wrap.on{display:flex}
.pvd-label{font-size:12px;color:var(--text-4);font-family:var(--mono);text-transform:uppercase;letter-spacing:.6px;white-space:nowrap}
.pvd-pills{display:flex;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:3px;gap:2px}
.pvd-btn{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:4px;font-family:var(--font);font-size:12px;font-weight:500;cursor:pointer;color:var(--text-3);background:transparent;border:none;transition:all .2s;white-space:nowrap}
.pvd-btn:hover{color:var(--text-2)}
.pvd-btn.on{background:var(--surface-3);color:var(--text);box-shadow:0 1px 4px #0006}
.pvd-btn svg{flex-shrink:0;transition:opacity .2s}
.pvd-btn:not(.on) svg{opacity:.45}
.pvd-btn.on.pvd-claude svg{color:#e8a87c}
.pvd-btn.on.pvd-gemini svg{color:#7ab4ff}
.pvd-model{font-family:var(--mono);font-size:10px;color:var(--text-4);margin-left:2px;opacity:.7}

/* --- Scan bar --- */
.scan-bar{display:none;padding:12px 18px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:24px;font-size:13px;color:var(--text-3)}
.scan-bar.on{display:flex;align-items:center;gap:10px}
.scan-bar .spinner{width:14px;height:14px;margin:0;border-width:2px}
.scan-pct{font-family:var(--mono);color:var(--text-4);font-size:11px}

/* --- Toast --- */
.toast{position:fixed;bottom:20px;right:20px;padding:12px 20px;border-radius:8px;font-size:14px;font-weight:500;color:#fff;transform:translateY(60px);opacity:0;transition:all .3s var(--ease);z-index:99;max-width:400px}
.toast.show{transform:translateY(0);opacity:1}
.toast-ok{background:#059669}.toast-err{background:#dc2626}.toast-info{background:var(--surface-3);border:1px solid var(--border);color:var(--text)}

/* --- Responsive --- */
@media(max-width:600px){
  .app{padding:24px 16px 80px}
  .stats{flex-wrap:wrap}.stat{min-width:45%}
  .prompt-foot{flex-direction:column;align-items:stretch}.btn-gen{width:100%}
  .s-album{display:none}.res-actions{flex-direction:column}.hist-item{flex-direction:column;align-items:stretch;gap:8px}.hist-btn{align-self:flex-start}
  .prompt-wrap textarea{font-size:15px;min-height:64px}
  .app{max-width:100%}
}
</style>
</head>
<body>
<div class="app" id="app">

  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-mark">&#9835;</div>
      <h1>Navi<span>Craft</span></h1>
    </div>
    <div class="header-right">
      <div class="badge" id="scanBadge" onclick="triggerScan()" title="Click to rescan library">
        <span class="dot dot-ok" id="scanDot"></span>
        <span id="scanText">Indexed</span>
      </div>
    </div>
  </header>

  <!-- Scan Progress Bar -->
  <div class="scan-bar" id="scanBar">
    <div class="spinner"></div>
    <span id="scanMsg">Scanning...</span>
    <span class="scan-pct" id="scanPct"></span>
  </div>

  <!-- Enrichment Progress -->
  <div class="enrich-bar" id="enrichBar">
    <span id="enrichText">Enriching...</span>
    <div style="flex:1;background:var(--surface-3);border-radius:2px;height:3px"><div class="enrich-fill" id="enrichFill" style="width:0%"></div></div>
  </div>

  <!-- Stats -->
  <div class="stats" id="stats" style="display:none">
    <div class="stat"><div class="stat-val" id="vSongs">&mdash;</div><div class="stat-lbl">Songs</div></div>
    <div class="stat"><div class="stat-val" id="vAlbums">&mdash;</div><div class="stat-lbl">Albums</div></div>
    <div class="stat"><div class="stat-val" id="vArtists">&mdash;</div><div class="stat-lbl">Artists</div></div>
    <div class="stat"><div class="stat-val" id="vDuration">&mdash;</div><div class="stat-lbl">Total Time</div></div>
  </div>

  <!-- Prompt -->
  <div class="prompt-wrap">
    <textarea id="prompt" placeholder="Describe the playlist you want...&#10;&#10;e.g. &quot;An introspective late-night mix — shoegaze, dream pop, slowcore. &#10;Think Slowdive meets Low. Keep it under an hour.&quot;" rows="3"></textarea>
    <div class="prompt-foot">
      <div class="prompt-opts">
        <div class="opt">
          <span>Songs</span>
          <input type="number" id="maxSongs" value="25" min="5" max="100">
        </div>
        <div class="opt">
          <span>Minutes</span>
          <input type="number" id="targetMin" value="" min="5" max="600" placeholder="any">
        </div>
        <label class="toggle-wrap" onclick="toggleAuto(event)">
          <div class="toggle-track" id="autoToggle"></div>
          <span>Save without preview</span>
        </label>
        <div class="pvd-wrap" id="pvdWrap">
          <span class="pvd-label">AI</span>
          <div class="pvd-pills">
            <button class="pvd-btn pvd-claude" id="pvdClaude" onclick="setProvider('claude')">
              <!-- Anthropic-style mark: simplified triangle A -->
              <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
                <path d="M8 1.5L14.2 13.5H1.8L8 1.5Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
                <path d="M5.2 10.5H10.8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
              </svg>
              Claude
              <span class="pvd-model" id="pvdClaudeModel"></span>
            </button>
            <button class="pvd-btn pvd-gemini" id="pvdGemini" onclick="setProvider('gemini')">
              <!-- Gemini 4-point star -->
              <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor">
                <path d="M8 1C8 1 6.8 5.8 5.5 7.1 4.2 8.4 1 8 1 8 1 8 4.2 7.6 5.5 8.9 6.8 10.2 8 15 8 15 8 15 9.2 10.2 10.5 8.9 11.8 7.6 15 8 15 8 15 8 11.8 8.4 10.5 7.1 9.2 5.8 8 1 8 1Z"/>
              </svg>
              Gemini
              <span class="pvd-model" id="pvdGeminiModel"></span>
            </button>
          </div>
        </div>
      </div>
      <button class="btn-gen" id="genBtn" onclick="generate()">Generate</button>
    </div>
  </div>

  <!-- Loading -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div class="load-msg" id="loadMsg">Analyzing your library...</div>
    <div class="load-sub" id="loadSub">Pass 1: Extracting intent from your prompt</div>
  </div>

  <!-- Results -->
  <div class="results" id="results">
    <div class="res-top">
      <div class="res-name" id="plName"></div>
      <div class="saved-pill" id="savedPill" style="display:none">&#10003; Saved</div>
    </div>
    <div class="res-desc" id="plDesc"></div>
    <div class="res-meta">
      <span id="plMatch"></span>
      <span id="plDur"></span>
      <span id="plCandidates"></span>
    </div>
    <ul class="songs" id="songList"></ul>
    <div class="res-actions">
      <button class="btn btn-primary" id="saveBtn" onclick="savePlaylist()">Save to Navidrome</button>
      <button class="btn btn-ghost" onclick="exportM3U()">Export .m3u</button>
      <button class="btn btn-ghost" onclick="moreLikeThis()">More like this</button>
      <button class="btn btn-ghost" onclick="reset()">New playlist</button>
    </div>
  </div>

  <!-- Playlist History -->
  <div class="history" id="historySection" style="display:none">
    <h2>Recent Playlists</h2>
    <ul class="hist-list" id="histList"></ul>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// --- State ---
let currentResult = null;
let scanPollTimer = null;
let activeProvider = null; // null = use server default

const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);

// --- Utils ---
function toast(msg, type='info'){
  const t=$('#toast');t.textContent=msg;
  t.className=`toast toast-${type==='success'?'ok':type==='error'?'err':'info'}`;
  setTimeout(()=>t.classList.add('show'),10);
  setTimeout(()=>t.classList.remove('show'),3500);
}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function fmtDur(s){if(!s)return'';const m=Math.floor(s/60),sec=Math.floor(s%60);return`${m}:${String(sec).padStart(2,'0')}`}
function fmtTotal(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60);return h>0?`${h}h ${m}m`:`${m}m`}
function num(n){return(n||0).toLocaleString()}

async function api(path,opts={},timeoutMs=300000){
  const ctrl=new AbortController();
  const timer=setTimeout(()=>ctrl.abort(),timeoutMs);
  try{
    const r=await fetch(`/api${path}`,{headers:{'Content-Type':'application/json'},signal:ctrl.signal,...opts});
    if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.detail||`Error ${r.status}`)}
    return r.json();
  }catch(e){
    if(e.name==='AbortError')throw new Error('Request timed out. The AI may be slow — try again.');
    throw e;
  }finally{clearTimeout(timer)}
}

// --- Init ---
async function init(){
  loadStats();
  loadProviders();
  pollScan();
  pollEnrichment();
  loadHistory();
}

// --- AI Provider selector ---
async function loadProviders(){
  try{
    const p=await api('/ai/providers');
    if(p.available.length<2)return; // only show when there's a real choice
    // populate model labels
    p.available.forEach(pv=>{
      if(pv.id==='claude'){
        const m=pv.model.replace('claude-','').replace(/-\d{8}$/,'');
        $('#pvdClaudeModel').textContent=m;
      }
      if(pv.id==='gemini'){
        const m=pv.model.replace('gemini-','');
        $('#pvdGeminiModel').textContent=m;
      }
    });
    setProvider(p.default);
    $('#pvdWrap').classList.add('on');
  }catch{}
}

function setProvider(id){
  activeProvider=id;
  $('#pvdClaude').classList.toggle('on',id==='claude');
  $('#pvdGemini').classList.toggle('on',id==='gemini');
}

async function loadStats(){
  try{
    const s=await api('/library/stats');
    $('#vSongs').textContent=num(s.song_count);
    $('#vAlbums').textContent=num(s.album_count);
    $('#vArtists').textContent=num(s.artist_count);
    $('#vDuration').textContent=fmtTotal(s.total_duration||0);
    $('#stats').style.display='';

    // Update scan badge
    if(s.song_count>0){
      $('#scanDot').className='dot dot-ok';
      $('#scanText').textContent=`${num(s.song_count)} indexed`;
    }
  }catch(e){console.warn('Stats load failed:',e)}
}

function toggleAuto(e){
  e.preventDefault();
  $('#autoToggle').classList.toggle('on');
}

// --- Scan ---
async function triggerScan(){
  try{
    await api('/scan',{method:'POST'});
    toast('Scan started','info');
    pollScan();
  }catch(e){toast(e.message,'error')}
}

function pollScan(){
  if(scanPollTimer)clearInterval(scanPollTimer);
  scanPollTimer=setInterval(async()=>{
    try{
      const s=await api('/scan/status');
      if(s.scanning){
        $('#scanBar').classList.add('on');
        $('#scanMsg').textContent=s.message||'Scanning...';
        $('#scanPct').textContent=s.total?`${s.current}/${s.total}`:'';
        $('#scanDot').className='dot dot-busy';
        $('#scanText').textContent='Scanning';
      }else{
        $('#scanBar').classList.remove('on');
        if(s.phase==='idle'){
          clearInterval(scanPollTimer);
          scanPollTimer=null;
          loadStats(); // refresh stats after scan completes
        }
      }
    }catch{}
  },1500);
  // Stop polling after 10 min max
  setTimeout(()=>{if(scanPollTimer){clearInterval(scanPollTimer);scanPollTimer=null}},600000);
}

// --- Generate (SSE streaming) ---
const PHASE_LABELS={
  pass1:'Pass 1: Analyzing your prompt...',
  filtering:'Searching your library...',
  broadening:'Broadening search...',
  pass2:'Pass 2: AI is selecting songs...',
  matching:'Building playlist...',
  saving:'Saving to Navidrome...',
};

async function generate(){
  const prompt=$('#prompt').value.trim();
  if(!prompt){toast('Enter a prompt','error');return}

  const maxSongs=parseInt($('#maxSongs').value)||25;
  const targetMin=$('#targetMin').value?parseInt($('#targetMin').value):null;
  const autoCreate=$('#autoToggle').classList.contains('on');

  $('#genBtn').disabled=true;
  $('#results').classList.remove('on');
  $('#loading').classList.add('on');
  $('#loadMsg').textContent='Starting...';
  $('#loadSub').textContent='';

  const body={prompt,max_songs:maxSongs,auto_create:autoCreate};
  if(targetMin)body.target_duration_min=targetMin;
  if(activeProvider)body.provider=activeProvider;

  let startTime=Date.now();
  let elapsed;
  const elapsedTimer=setInterval(()=>{
    elapsed=Math.floor((Date.now()-startTime)/1000);
    $('#loadSub').textContent=`${elapsed}s elapsed`;
  },1000);

  try{
    const resp=await fetch('/api/generate',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(body),
    });

    if(!resp.ok){
      const e=await resp.json().catch(()=>({}));
      throw new Error(e.detail||`Error ${resp.status}`);
    }

    const reader=resp.body.getReader();
    const decoder=new TextDecoder();
    let buffer='';
    let gotResult=false;

    while(true){
      const {done,value}=await reader.read();
      if(done)break;
      buffer+=decoder.decode(value,{stream:true});

      // Parse SSE events from buffer
      const lines=buffer.split('\n');
      buffer=lines.pop(); // keep incomplete line in buffer
      let eventType=null;
      for(const line of lines){
        if(line.startsWith('event: ')){
          eventType=line.slice(7).trim();
        }else if(line.startsWith('data: ')&&eventType){
          const data=JSON.parse(line.slice(6));
          if(eventType==='progress'){
            const label=PHASE_LABELS[data.phase]||data.message||'Working...';
            $('#loadMsg').textContent=label;
          }else if(eventType==='result'){
            currentResult=data;
            gotResult=true;
          }else if(eventType==='error'){
            throw new Error(data.detail||'Generation failed');
          }
          eventType=null;
        }
      }
    }

    if(gotResult){
      renderResults(currentResult);
      loadHistory();
    }else{
      throw new Error('No result received from server');
    }
  }catch(e){
    toast(e.message,'error');
  }finally{
    clearInterval(elapsedTimer);
    $('#genBtn').disabled=false;
    $('#loading').classList.remove('on');
  }
}

function renderResults(r){
  $('#plName').textContent=r.name;
  $('#plDesc').textContent=r.description;
  $('#plMatch').textContent=`${r.total_matched} songs`;
  $('#plDur').textContent=`${fmtTotal(r.total_duration)}`;
  $('#plCandidates').textContent=`from ${r.candidates_found} candidates`;

  const list=$('#songList');list.innerHTML='';
  r.songs.forEach((s,i)=>{
    const li=document.createElement('li');li.className='song';
    li.innerHTML=`
      <span class="s-num">${i+1}</span>
      <div class="s-info">
        <div class="s-title">${esc(s.title)}</div>
        <div class="s-artist">${esc(s.artist)}${s.year?' · '+s.year:''}</div>
      </div>
      <div class="s-album">${esc(s.album)}</div>
      <div class="s-dur">${fmtDur(s.duration)}</div>
    `;
    list.appendChild(li);
  });

  if(r.created){
    $('#savedPill').style.display='';$('#saveBtn').style.display='none';
  }else{
    $('#savedPill').style.display='none';$('#saveBtn').style.display='';
  }

  $('#results').classList.add('on');
  $('#results').scrollIntoView({behavior:'smooth',block:'start'});
}

// --- Save ---
async function savePlaylist(){
  if(!currentResult||!currentResult.songs.length)return;
  const ndIds=currentResult.songs.map(s=>s.navidrome_id).filter(Boolean);
  if(!ndIds.length){toast('No Navidrome IDs found — run a sync first','error');return}
  try{
    await api('/playlists',{method:'POST',body:JSON.stringify({name:currentResult.name,song_ids:ndIds})});
    toast('Playlist saved to Navidrome!','success');
    $('#savedPill').style.display='';$('#saveBtn').style.display='none';
  }catch(e){toast(`Save failed: ${e.message}`,'error')}
}

// --- Export .m3u ---
async function exportM3U(){
  if(!currentResult||!currentResult.songs.length)return;
  try{
    const resp=await fetch('/api/export/m3u',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({name:currentResult.name,songs:currentResult.songs}),
    });
    if(!resp.ok)throw new Error('Export failed');
    const blob=await resp.blob();
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download=`${currentResult.name.replace(/[^a-zA-Z0-9 _-]/g,'')}.m3u`;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    URL.revokeObjectURL(url);
    toast('M3U file downloaded','success');
  }catch(e){toast(`Export failed: ${e.message}`,'error')}
}

function reset(){
  $('#results').classList.remove('on');
  currentResult=null;
  $('#prompt').value='';
  $('#prompt').focus();
  window.scrollTo({top:0,behavior:'smooth'});
}

function moreLikeThis(){
  if(!currentResult)return;
  const artists=[...new Set(currentResult.songs.slice(0,10).map(s=>s.artist).filter(Boolean))].slice(0,5);
  const desc=currentResult.description||'';
  const orig=currentResult.name||'';
  const newPrompt=`More like "${orig}" — ${desc}${artists.length?'. Artists like '+artists.join(', '):''}`;
  $('#prompt').value=newPrompt;
  $('#results').classList.remove('on');
  currentResult=null;
  window.scrollTo({top:0,behavior:'smooth'});
  $('#prompt').focus();
}

// --- Enrichment progress ---
let enrichTimer=null;
function pollEnrichment(){
  if(enrichTimer)clearInterval(enrichTimer);
  const check=async()=>{
    try{
      const s=await api('/popularity/status');
      if(s.remaining>0){
        $('#enrichBar').classList.add('on');
        $('#enrichText').textContent=`Enriching: ${num(s.enriched)} / ${num(s.total)} (${s.percent}%)`;
        $('#enrichFill').style.width=`${s.percent}%`;
      }else{
        $('#enrichBar').classList.remove('on');
      }
    }catch{}
  };
  check();
  enrichTimer=setInterval(check,15000);
}

// --- Playlist History ---
async function loadHistory(){
  try{
    const history=await api('/playlists/history');
    if(!history||!history.length){$('#historySection').style.display='none';return}
    const list=$('#histList');list.innerHTML='';
    history.slice(0,20).forEach(h=>{
      const li=document.createElement('li');li.className='hist-item';
      const dur=h.total_duration?fmtTotal(h.total_duration):'';
      const date=h.created_at?new Date(h.created_at+'Z').toLocaleDateString():'';
      const promptEsc=esc(h.prompt||'').replace(/'/g,"\\'");
      li.innerHTML=`
        <div class="hist-left">
          <div class="hist-name">${esc(h.name)}</div>
          <div class="hist-prompt">${esc(h.prompt||'')}</div>
          <div class="hist-meta">${h.song_count||0} songs · ${dur}${date?' · '+date:''}</div>
        </div>
        <div class="hist-actions">
          <button class="hist-btn" onclick="reusePrompt(event,'${promptEsc}')">Reuse</button>
          <button class="hist-btn-del" onclick="deleteHistory(event,${h.id})" title="Delete from history">&#10005;</button>
        </div>
      `;
      list.appendChild(li);
    });
    $('#historySection').style.display='';
  }catch(e){console.warn('History load failed:',e)}
}

async function deleteHistory(e,id){
  e.stopPropagation();
  try{
    await api(`/playlists/history/${id}`,{method:'DELETE'});
    loadHistory();
  }catch(err){toast(`Delete failed: ${err.message}`,'error')}
}

function reusePrompt(e,prompt){
  e.stopPropagation();
  $('#prompt').value=prompt;
  $('#results').classList.remove('on');
  currentResult=null;
  window.scrollTo({top:0,behavior:'smooth'});
  $('#prompt').focus();
  toast('Prompt loaded — edit and generate','info');
}

// Enter = generate (Shift+Enter = newline)
$('#prompt').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();generate()}
});

init();
</script>
