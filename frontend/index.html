<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NaviCraft</title>
<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
<link rel="alternate icon" type="image/png" href="/assets/favicon.svg">
<link rel="apple-touch-icon" href="/assets/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/styles.css">
</head>
<body>
<div class="app" id="app">

  <!-- Header -->
  <header>
    <div class="header-left">
      <div class="logo">
        <div class="logo-mark" onclick="triggerScan()" title="Click to rescan library">&#9835;</div>
        <h1>Navi<span>Craft</span></h1>
      </div>
      <div class="srv-status">
        <div class="nd-pill" id="ndBar" onclick="testServer('navidrome')" title="Click to retest">
          <div class="nd-dot" id="ndDot"></div>
          <span id="ndMsg">Navidrome</span>
        </div>
        <div class="nd-pill" id="plexBar" onclick="testServer('plex')" title="Click to retest" style="display:none">
          <div class="nd-dot" id="plexDot"></div>
          <span id="plexMsg">Plex</span>
        </div>
      </div>
    </div>
    <button class="cfg-btn" onclick="openConfig()" title="Settings">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </header>

  <!-- Scan Progress Bar -->
  <div class="scan-bar" id="scanBar">
    <div class="spinner"></div>
    <span id="scanMsg">Scanning...</span>
    <span class="scan-pct" id="scanPct"></span>
  </div>

  <!-- Enrichment Progress -->
  <div class="enrich-bar" id="enrichBar">
    <div class="enrich-row">
      <span class="enrich-label">Deezer</span>
      <div class="enrich-track"><div class="enrich-fill deezer" id="enrichFillDeezer"></div></div>
      <span class="enrich-pct" id="enrichTextDeezer">0%</span>
    </div>
    <div class="enrich-row">
      <span class="enrich-label">Last.fm</span>
      <div class="enrich-track"><div class="enrich-fill lastfm" id="enrichFillLastfm"></div></div>
      <span class="enrich-pct" id="enrichTextLastfm">0%</span>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats" id="stats" style="display:none">
    <div class="stat"><div class="stat-val" id="vSongs">&mdash;</div><div class="stat-lbl">Songs</div></div>
    <div class="stat"><div class="stat-val" id="vAlbums">&mdash;</div><div class="stat-lbl">Albums</div></div>
    <div class="stat"><div class="stat-val" id="vArtists">&mdash;</div><div class="stat-lbl">Artists</div></div>
    <div class="stat"><div class="stat-val" id="vDuration">&mdash;</div><div class="stat-lbl">Total Time</div></div>
  </div>

  <!-- Prompt -->
  <div class="prompt-wrap">
    <textarea id="prompt" placeholder="Describe the playlist you want..." rows="3"></textarea>
    <div class="prompt-foot">
      <div class="prompt-opts">
        <div class="mode-wrap">
          <div class="mode-pills">
            <button class="mode-btn on" id="modeSongs" onclick="setMode('songs')">Songs</button>
            <button class="mode-btn" id="modeDuration" onclick="setMode('duration')">Duration</button>
          </div>
          <input type="number" class="mode-input" id="maxSongs" value="30" min="1" max="999" oninput="clampInput(this)">
          <input type="number" class="mode-input" id="targetMin" value="90" min="1" max="999" oninput="clampInput(this)" style="display:none">
        </div>
        <label class="toggle-wrap" onclick="togglePreview(event)">
          <div class="toggle-track on" id="previewToggle"></div>
          <span>Preview</span>
        </label>
        <div class="pvd-wrap" id="pvdWrap">
          <div class="pvd-pills">
            <button class="pvd-btn pvd-claude" id="pvdClaude" onclick="setProvider('claude')">
              <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
                <path d="M8 1.5L14.2 13.5H1.8L8 1.5Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
                <path d="M5.2 10.5H10.8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
              </svg>
              Claude
              <span class="pvd-model" id="pvdClaudeModel"></span>
            </button>
            <button class="pvd-btn pvd-gemini" id="pvdGemini" onclick="setProvider('gemini')">
              <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor">
                <path d="M8 1C8 1 6.8 5.8 5.5 7.1 4.2 8.4 1 8 1 8 1 8 4.2 7.6 5.5 8.9 6.8 10.2 8 15 8 15 8 15 9.2 10.2 10.5 8.9 11.8 7.6 15 8 15 8 15 8 11.8 8.4 10.5 7.1 9.2 5.8 8 1 8 1Z"/>
              </svg>
              Gemini
              <span class="pvd-model" id="pvdGeminiModel"></span>
            </button>
          </div>
        </div>
      </div>
      <button class="btn-gen" id="genBtn" onclick="generate()">Generate</button>
    </div>
  </div>

  <!-- Loading -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div class="load-msg" id="loadMsg">Analyzing your library...</div>
    <div class="load-sub" id="loadSub">Pass 1: Extracting intent from your prompt</div>
  </div>

  <!-- Results -->
  <div class="results" id="results">
    <div class="res-top">
      <div class="res-name" id="plName"></div>
    </div>
    <div class="res-desc" id="plDesc"></div>
    <div class="res-meta">
      <span id="plMatch"></span>
      <span id="plDur"></span>
      <span id="plCandidates"></span>
    </div>
    <ul class="songs" id="songList"></ul>
    <div class="res-actions">
      <div class="export-group" id="exportGroup">
        <button class="btn btn-primary" id="saveNavidromeBtn" onclick="saveToServer('navidrome')" style="display:none">Save to Navidrome</button>
        <button class="btn btn-primary" id="savePlexBtn" onclick="saveToServer('plex')" style="display:none">Save to Plex</button>
        <button class="btn btn-ghost" onclick="exportM3U()">Export .m3u</button>
      </div>
      <div class="saved-pills" id="savedPills" style="display:none"></div>
      <button class="btn btn-ghost" onclick="reset()">New playlist</button>
    </div>
  </div>

</div>

<!-- Config Modal -->
<div class="cfg-overlay" id="cfgOverlay" onclick="closeConfig()">
  <div class="cfg-modal" onclick="event.stopPropagation()">
    <div class="cfg-header">
      <h2>Settings</h2>
      <button class="cfg-close" onclick="closeConfig()">&times;</button>
    </div>
    <div class="cfg-body">
      <div class="cfg-section">
        <h3>Navidrome</h3>
        <label class="cfg-field">
          <span>URL</span>
          <input type="text" id="cfgNavidromeUrl" placeholder="http://localhost:4533">
        </label>
        <label class="cfg-field">
          <span>User</span>
          <input type="text" id="cfgNavidromeUser" placeholder="admin">
        </label>
        <label class="cfg-field">
          <span>Password</span>
          <input type="password" id="cfgNavidromePassword" placeholder="••••">
        </label>
      </div>
      <div class="cfg-section">
        <h3>Plex / Plexamp</h3>
        <label class="cfg-field">
          <span>URL</span>
          <input type="text" id="cfgPlexUrl" placeholder="http://localhost:32400">
        </label>
        <label class="cfg-field">
          <span>Token</span>
          <input type="password" id="cfgPlexToken" placeholder="••••">
        </label>
      </div>
      <div class="cfg-section">
        <h3>AI Provider</h3>
        <label class="cfg-field">
          <span>Claude API Key</span>
          <input type="password" id="cfgClaudeApiKey" placeholder="sk-ant-...">
        </label>
        <label class="cfg-field">
          <span>Claude Model</span>
          <input type="text" id="cfgClaudeModel" placeholder="claude-3-5-sonnet-20241022">
        </label>
        <label class="cfg-field">
          <span>Gemini API Key</span>
          <input type="password" id="cfgGeminiApiKey" placeholder="••••">
        </label>
        <label class="cfg-field">
          <span>Gemini Model</span>
          <input type="text" id="cfgGeminiModel" placeholder="gemini-2.5-flash">
        </label>
      </div>
      <div class="cfg-section">
        <h3>Enrichment</h3>
        <label class="cfg-field">
          <span>Last.fm API Key</span>
          <input type="password" id="cfgLastfmApiKey" placeholder="••••">
        </label>
      </div>
      <div class="cfg-section">
        <h3>Scanner</h3>
        <label class="cfg-field">
          <span>Scan Interval (hours)</span>
          <input type="text" inputmode="numeric" pattern="[0-9]*" id="cfgScanIntervalHours" placeholder="6" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
        </label>
      </div>
    </div>
    <div class="cfg-footer">
      <button class="btn btn-ghost" onclick="closeConfig()">Cancel</button>
      <button class="btn btn-primary" onclick="saveConfig()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="/assets/app.js"></script>
</body>
</html>
